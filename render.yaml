services:
  - type: web
    name: jyotishconnect-api
    runtime: node
    region: singapore   # closest to India; change to ohio/frankfurt if preferred
    plan: free          # upgrade to starter ($7/mo) for always-on
    rootDir: backend/api
    buildCommand: npm ci --omit=dev
    startCommand: node app.js
    healthCheckPath: /health
    autoDeploy: true    # redeploys on every push to the branch below
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"        # Render injects PORT automatically; this is the default
      - key: SUPABASE_URL
        sync: false           # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: CLEANUP_SECRET
        sync: false
      - key: ADMIN_SEED_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false           # e.g. https://your-flutter-app.netlify.app
