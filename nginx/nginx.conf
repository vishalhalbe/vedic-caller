worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options        DENY            always;
    add_header X-Content-Type-Options nosniff         always;
    add_header Referrer-Policy        no-referrer     always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;

    # ── Rate limiting (coarse IP-level guard; fine-grained limits are in Express) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS termination ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # TLS certificates — mount these volumes in docker-compose.yml:
        #   ./ssl/fullchain.pem  → obtained via Certbot or acme.sh
        #   ./ssl/privkey.pem
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Proxy to Node.js API ──────────────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            # Use $remote_addr (not $proxy_add_x_forwarded_for) so clients cannot
            # spoof X-Forwarded-For to bypass Express rate limiting.
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }
    }
}
