name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'railway.toml'

jobs:
  deploy:
    name: Railway Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
