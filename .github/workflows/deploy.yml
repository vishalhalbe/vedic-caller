name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'render.yaml'

jobs:
  deploy:
    name: Render Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
