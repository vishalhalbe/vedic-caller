name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'

jobs:
  test:
    name: Jest (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        env:
          NODE_ENV: test
          # Supabase JS client — required by app.js startup check and all route handlers.
          # CI uses the real Supabase test project; tests run against live DB just like local dev.
          # Set SUPABASE_URL and SUPABASE_KEY as repository secrets in GitHub Settings.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JWT_SECRET: ci-test-secret-at-least-48-chars-long-for-safety
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: test_secret_placeholder
          RAZORPAY_WEBHOOK_SECRET: ''
          AGORA_APP_ID: test_agora_app_id
          AGORA_APP_CERTIFICATE: test_agora_certificate
          ADMIN_SEED_SECRET: test_admin_seed
          CLEANUP_SECRET: test_cleanup_secret
          PORT: 3000
        run: npm test -- --forceExit --ci

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: backend/api/jest-results.json
          retention-days: 7
