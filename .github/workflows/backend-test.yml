name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'

jobs:
  test:
    name: Jest (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: jyotish
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        env:
          PGPASSWORD: testpass123
        run: |
          for f in ../../supabase/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -d jyotish -f "$f" || true
          done

      - name: Run Jest tests
        env:
          NODE_ENV: test
          DB_URI: postgres://postgres:testpass123@localhost:5432/jyotish
          JWT_SECRET: ci-test-secret-at-least-48-chars-long-for-safety
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: test_secret_placeholder
          RAZORPAY_WEBHOOK_SECRET: ''
          AGORA_APP_ID: test_agora_app_id
          AGORA_APP_CERTIFICATE: test_agora_certificate
          PORT: 3000
        run: npm test -- --forceExit --ci

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: backend/api/jest-results.json
          retention-days: 7
