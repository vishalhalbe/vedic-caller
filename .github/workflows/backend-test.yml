name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'
      - '.github/workflows/backend-test.yml'

jobs:
  test:
    name: Jest (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        env:
          NODE_ENV: test
          # Supabase JS client — required by app.js startup check and all route handlers.
          # CI uses the real Supabase test project; tests run against live DB just like local dev.
          # Set SUPABASE_URL and SUPABASE_KEY as repository secrets in GitHub Settings.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JWT_SECRET: ci-test-secret-at-least-48-chars-long-for-safety
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_TEST_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_TEST_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
          ADMIN_SEED_SECRET: ${{ secrets.ADMIN_SEED_SECRET }}
          CLEANUP_SECRET: test_cleanup_secret
          PORT: 3000
        run: npm test -- --forceExit --ci --verbose --json --outputFile=jest-results.json 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: backend/api/jest-results.json
          retention-days: 7
