name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'e2e/**'
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'e2e/**'
      - 'supabase/migrations/**'

jobs:
  e2e:
    name: Playwright API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: jyotish
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DB_URI: postgres://postgres:testpass123@localhost:5432/jyotish
      JWT_SECRET: ci-test-secret-at-least-48-chars-long-for-safety
      RAZORPAY_KEY_ID: rzp_test_placeholder
      RAZORPAY_KEY_SECRET: test_secret_placeholder
      RAZORPAY_WEBHOOK_SECRET: ''
      AGORA_APP_ID: test_agora_app_id
      AGORA_APP_CERTIFICATE: test_agora_certificate
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install backend dependencies
        working-directory: backend/api
        run: npm ci

      - name: Apply database migrations
        env:
          PGPASSWORD: testpass123
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -d jyotish -f "$f" || true
          done

      - name: Start backend server
        working-directory: backend/api
        run: node app.js &
        # Give it a moment to bind

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
          RAZORPAY_KEY_SECRET: test_secret_placeholder
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
