name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/api/**'
      - 'supabase/migrations/**'

jobs:
  e2e:
    name: Playwright API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JWT_SECRET: ci-test-secret-at-least-48-chars-long-for-safety
          RAZORPAY_KEY_ID: rzp_test_placeholder
          RAZORPAY_KEY_SECRET: test_secret_placeholder
          RAZORPAY_WEBHOOK_SECRET: ''
          AGORA_APP_ID: test_agora_app_id
          AGORA_APP_CERTIFICATE: test_agora_certificate
          ADMIN_SEED_SECRET: test_admin_seed
          CLEANUP_SECRET: test_cleanup_secret
          PORT: 3000
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: backend/api/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/api/test-results/
          retention-days: 7
